<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#07080f"/>
    </radialGradient>
    <radialGradient id="inner" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#7b2fff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#07080f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bc">
      <circle cx="50" cy="44" r="32"/>
    </clipPath>
  </defs>

  <!-- Square background -->
  <rect width="100" height="100" fill="url(#bg)" rx="16"/>

  <!-- Outer glow -->
  <circle cx="50" cy="44" r="40" fill="url(#glow)"/>

  <!-- Ball -->
  <circle cx="50" cy="44" r="32" fill="#0d0a2e"/>
  <circle cx="50" cy="44" r="32" fill="url(#inner)"/>

  <!-- Inner cosmos -->
  <g clip-path="url(#bc)">
    <ellipse cx="46" cy="38" rx="18" ry="12" fill="#3b0e8c" opacity="0.5"/>
    <ellipse cx="56" cy="50" rx="15" ry="10" fill="#1a4080" opacity="0.4"/>
    <!-- Stars -->
    <circle cx="36" cy="34" r="0.8" fill="#fff" opacity="1"/>
    <circle cx="62" cy="36" r="0.8" fill="#ffd700" opacity="1"/>
    <circle cx="40" cy="56" r="0.6" fill="#fff" opacity="0.9"/>
    <circle cx="65" cy="52" r="0.8" fill="#fff" opacity="0.9"/>
    <!-- Central orb -->
    <circle cx="50" cy="46" r="10" fill="#ffd700" opacity="0.85"/>
    <circle cx="47" cy="43" r="3.5" fill="#fff8e1" opacity="0.9"/>
    <!-- Ring -->
    <ellipse cx="50" cy="46" rx="14" ry="3.5" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Ball shine -->
  <ellipse cx="40" cy="34" rx="9" ry="6" fill="#fff" opacity="0.15"/>
  <ellipse cx="37" cy="32" rx="4" ry="3" fill="#fff" opacity="0.2"/>

  <!-- Ball border -->
  <circle cx="50" cy="44" r="32" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.7"/>

  <!-- Stand -->
  <rect x="34" y="75" width="32" height="5" rx="2.5" fill="#3d2e00"/>
  <ellipse cx="50" cy="80" rx="20" ry="4" fill="#2a1f00"/>
  <!-- Stem -->
  <rect x="42" y="74" width="16" height="4" rx="2" fill="#3d2e00"/>

  <!-- Gold dots top corners -->
  <circle cx="22" cy="18" r="2" fill="#ffd700" opacity="0.8"/>
  <circle cx="78" cy="18" r="2" fill="#ffd700" opacity="0.8"/>
  <circle cx="15" cy="35" r="1.2" fill="#ffd700" opacity="0.5"/>
  <circle cx="85" cy="35" r="1.2" fill="#ffd700" opacity="0.5"/>
</svg>
